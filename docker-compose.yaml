services:
  db-tests:
    image: postgres:13
    healthcheck:
      test: [ "CMD", "bash", "-c", "exit 0"]
      timeout: 45s
      interval: 10s
      retries: 10
    volumes:
      - db_data:/var/lib/postgresql/data
    env_file: .env
    container_name: core-db-test
    environment:
      - POSTGRES_USER=${USER_DB}
      - POSTGRES_PASSWORD=${PASSWORD_DB}
      - POSTGRES_DB=${DB_NAME}
    networks:
      - core
    ports:
      - 5431:5432
  db:
    image: postgres:13
    healthcheck:
      test: [ "CMD", "bash", "-c", "exit 0"]
      timeout: 45s
      interval: 10s
      retries: 10
    volumes:
      - db_data:/var/lib/postgresql/data
    env_file: .env
    container_name: core-db
    environment:
      - POSTGRES_USER=${USER_DB}
      - POSTGRES_PASSWORD=${PASSWORD_DB}
      - POSTGRES_DB=${DB_NAME}
    networks:
      - core
    ports:
      - 5429:5432
  backend:
    image: golang:1.24.0
    networks:
      - core
    ports:
      - 8080:8080
    environment:
      - HOST_DB=db
      - PORT_DB=5432
      - PORT=8080
      - HOST=0.0.0.0
    env_file: .env
    volumes:
      - go-cache:/go/pkg/
      - ./:/app
    working_dir: /app
    command: go run main.go
    depends_on:
      db:
        condition: service_healthy
  backend-tests:
    image: golang:1.24.0
    networks:
      - core
    ports:
      - 8080:8080
    environment:
      - HOST_DB=db-test
      - PORT_DB=5432
    env_file: .env
    volumes:
      - go-cache:/go/pkg/
      - ./:/app
    working_dir: /app
    command: go run main.go
    depends_on:
      db-tests:
        condition: service_healthy
networks:
  core:

volumes:
  db_data:
  go-cache:
